<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - ShopHub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Header Navigation -->
    <header class="header" id="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <a href="../index.html">
                        <span class="logo-icon">🛍️</span>
                        <span class="logo-text">ShopHub</span>
                    </a>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
                    <button class="search-btn">🔍</button>
                </div>

                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="#">Categories</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>

                <div class="user-menu">
                    <a href="cart.html" class="cart-icon">
                        🛒 <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <div class="dropdown">
                        <button class="user-btn" id="userBtn">👤 Account</button>
                        <div class="dropdown-content" id="userDropdown">
                            <a href="profile.html">My Profile</a>
                            <a href="orders.html">My Orders</a>
                            <a href="#" onclick="logout()">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container products-page">
        <div class="page-header">
            <h1>Our Products</h1>
            <p>Browse our extensive collection of quality products</p>
        </div>

        <div class="products-container">
            <!-- Sidebar Filters -->
            <aside class="sidebar">
                <div class="filter-section">
                    <h3>Filters</h3>
                    
                    <div class="filter-group">
                        <h4>Category</h4>
                        <label><input type="checkbox" value="clothing"> Clothing</label>
                        <label><input type="checkbox" value="shoes"> Shoes</label>
                        <label><input type="checkbox" value="accessories"> Accessories</label>
                        <label><input type="checkbox" value="electronics"> Electronics</label>
                    </div>

                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <input type="range" min="0" max="500" value="500" id="priceRange">
                        <p>Price: $<span id="priceValue">500</span></p>
                    </div>

                    <div class="filter-group">
                        <h4>Rating</h4>
                        <label><input type="checkbox" value="5"> ⭐⭐⭐⭐⭐ 5 Stars</label>
                        <label><input type="checkbox" value="4"> ⭐⭐⭐⭐ 4+ Stars</label>
                        <label><input type="checkbox" value="3"> ⭐⭐⭐ 3+ Stars</label>
                    </div>

                    <button class="btn btn-primary btn-block" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn btn-secondary btn-block" onclick="clearFilters()">Clear Filters</button>
                </div>
            </aside>

            <!-- Products Grid -->
            <section class="products-section">
                <!-- Sort Options -->
                <div class="sort-options">
                    <label for="sortSelect">Sort by:</label>
                    <select id="sortSelect" onchange="sortProducts(this.value)">
                        <option value="newest">Newest</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Highest Rated</option>
                    </select>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid">
                    <!-- Loaded via JavaScript -->
                </div>

                <!-- No Products Found -->
                <div class="no-products" id="noProducts" style="display:none;">
                    <p>No products found. Try adjusting your filters.</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="footer"></footer>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let currentProducts = [];
        let filters = {
            categories: [],
            maxPrice: 500,
            minRating: 0,
            sortBy: 'newest'
        };

        document.addEventListener('DOMContentLoaded', () => {
            initializeProductsPage();
            updateCartCount();
        });

        function initializeProductsPage() {
            loadProducts();
            setupPriceRangeFilter();
            setupUserMenu();
            loadHeader();
            loadFooter();
        }

        function loadProducts() {
            const allProducts = getProducts();
            applyFilters(allProducts);
        }

        function applyFilters(products = null) {
            const allProducts = products || getProducts();
            
            currentProducts = allProducts.filter(product => {
                const matchesCategory = filters.categories.length === 0 || 
                                       filters.categories.includes(product.category);
                const matchesPrice = product.price <= filters.maxPrice;
                const matchesRating = product.rating >= filters.minRating;

                return matchesCategory && matchesPrice && matchesRating;
            });

            sortProducts(filters.sortBy);
            renderProducts();
        }

        function setupPriceRangeFilter() {
            const priceRange = document.getElementById('priceRange');
            const priceValue = document.getElementById('priceValue');

            priceRange.addEventListener('input', (e) => {
                const value = e.target.value;
                priceValue.textContent = value;
                filters.maxPrice = parseInt(value);
            });
        }

        function sortProducts(sortType) {
            filters.sortBy = sortType;

            switch(sortType) {
                case 'price-low':
                    currentProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    currentProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'rating':
                    currentProducts.sort((a, b) => b.rating - a.rating);
                    break;
                case 'newest':
                default:
                    currentProducts.sort((a, b) => b.id - a.id);
            }

            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (currentProducts.length === 0) {
                grid.innerHTML = '';
                noProducts.style.display = 'block';
                return;
            }

            noProducts.style.display = 'none';
            grid.innerHTML = currentProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                        ${product.discount ? `<span class="discount-badge">-${product.discount}%</span>` : ''}
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-category">${product.category}</p>
                        <div class="product-rating">
                            ${'⭐'.repeat(product.rating)}<span class="rating-text">${product.rating}/5</span>
                        </div>
                        <div class="product-price">
                            ${product.oldPrice ? `<span class="old-price">$${product.oldPrice}</span>` : ''}
                            <span class="current-price">$${product.price}</span>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-small" onclick="addToCart(${product.id})">Add to Cart</button>
                            <a href="product-detail.html?id=${product.id}" class="btn btn-outline btn-small">View</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function clearFilters() {
            filters = {
                categories: [],
                maxPrice: 500,
                minRating: 0,
                sortBy: 'newest'
            };

            document.getElementById('priceRange').value = 500;
            document.getElementById('priceValue').textContent = '500';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('sortSelect').value = 'newest';

            loadProducts();
        }

        // Update category filter checkboxes
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.filter-group input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    const categories = Array.from(
                        document.querySelectorAll('.filter-group input[type="checkbox"]:checked')
                    ).map(cb => cb.value).filter(v => v !== '5' && v !== '4' && v !== '3');

                    filters.categories = categories;
                    applyFilters();
                });
            });
        });
    </script>
</body>
</html>
